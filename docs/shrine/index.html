<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>功德 Shrine</title>
  <link rel="stylesheet" href="./shrine.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <button id="enterFullscreen" style="
    position:fixed;
    inset:0;
    background:transparent;
    border:0;
    z-index:999;
    cursor:pointer;
  "></button>

  <div id="app">
    <!-- 2D wall behind -->
    <div id="buddha-wall" aria-hidden="true"></div>

    <!-- 3D idol over wall -->
    <canvas id="scene"></canvas>

    <!-- Keep test donation -->
    <button id="test-donate">+ Test Donation</button>
  </div>

  <!-- Autoplay-unblock UI (only appears if needed) -->
  <button id="audio-unlock" style="
    position: fixed;
    inset: auto 16px 16px 16px;
    z-index: 10000;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.55);
    color: white;
    font: 600 14px/1.1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: none;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  ">Tap to enable shrine sound</button>

  <script type="module" src="./shrine.js"></script>
</body>
</html>
