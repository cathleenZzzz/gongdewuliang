<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>功德 Shrine</title>
  <link rel="stylesheet" href="./shrine.css" />

  <script type="importmap">

      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>

    <!-- TEMP: use your existing textures as collage so we avoid 404s -->

    <div id="wall">

    <button id="enable-audio">🔊 Enable Blessings Audio</button>

  <script type="module" src="./shrine.js"></script>
