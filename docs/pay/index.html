<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>功德 Pay</title>
  <link rel="stylesheet" href="./pay.css" />
</head>
<body>
  <div id="phone">
    <header id="topbar">
      <div class="brand">功德支付</div>
      <div class="sub">Temple Wallet · 终端</div>
    </header>

    <main id="screen">
      <section class="card">
        <div class="row">
          <div class="label">用户</div>
          <div id="user" class="value mono">—</div>
        </div>
        <div class="row">
          <div class="label">余额</div>
          <div id="balance" class="value mono">¥ 10,000.00</div>
        </div>
      </section>

      <section class="card">
        <div class="title">供奉金额</div>
        <div class="inputWrap">
          <span class="yen">¥</span>
          <input id="amount" inputmode="decimal" placeholder="例如 6 / 18 / 88 / 666" />
        </div>

        <div class="quick">
          <button class="q" data-amt="6">6</button>
          <button class="q" data-amt="18">18</button>
          <button class="q" data-amt="88">88</button>
          <button class="q" data-amt="666">666</button>
        </div>

        <button id="donate" class="primary">确认供奉</button>
        <div id="status" class="status"></div>
      </section>

      <section class="hint">
        扫码即匿名。供奉后将获得 <b>功德</b> 并在主殿显像 60 秒。
      </section>
    </main>
  </div>

  <!-- Ad modal -->
  <div id="adModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modalCard">
      <div class="adTitle">功德推广 · 限时优惠</div>
      <div class="adBody">
        <div class="adLine">今日供奉加赠：电子香火 +1</div>
        <div class="adLine">开光会员：免广告（暂未开通）</div>
        <div class="adLine tiny mono">* 未供奉用户将每 10–20 秒收到一次提示</div>
      </div>
      <button id="closeAd" class="ghost">我知道了</button>
    </div>
  </div>

  <script type="module" src="./pay.js"></script>
</body>
</html>
