<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1, viewport-fit=cover" />
  <title>Fortune Terminal</title>
  <link rel="stylesheet" href="./pay.css" />
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <button class="icon" id="backBtn" aria-label="Back">‹</button>
      <div class="title">Fortune Terminal</div>
      <button class="icon" id="warnBtn" aria-label="Info">!</button>
    </header>

    <main class="sheet">
      <section class="card">
        <div class="row">
          <div class="label">Identity</div>
          <div class="value mono" id="username">—</div>
        </div>

        <div class="row">
          <div class="label">Balance</div>
          <div class="value mono"><span id="total">0</span> units</div>
        </div>

        <div class="progressWrap">
          <div class="progressTop">
            <div class="muted">Trajectory</div>
            <div class="muted mono"><span id="pct">0</span>%</div>
          </div>
          <div class="bar">
            <div class="fill" id="fill"></div>
          </div>
          <div class="progressBottom">
            <div class="muted">Target: 88,888</div>
            <div class="muted mono"><span id="remaining">88,888</span> left</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="label">Contribution</div>

        <div class="presetRow">
          <button class="pill" data-amt="6">6</button>
          <button class="pill" data-amt="18">18</button>
          <button class="pill" data-amt="88">88</button>
          <button class="pill" data-amt="188">188</button>
          <button class="pill" data-amt="888">888</button>
          <button class="pill" data-amt="1888">1888</button>
        </div>

        <div class="inputRow">
          <input id="amountInput" inputmode="numeric" pattern="[0-9]*" placeholder="Enter units…" />
          <button id="maxBtn" class="ghost">Max</button>
        </div>

        <button id="payBtn" class="payBtn">
          Confirm &amp; Advance
        </button>

        <div class="fineprint">
          By advancing, you agree to receive improved outcomes, optimized horizons, and elevated personal performance.
        </div>
      </section>

      <section class="card soft">
        <div class="tiny">
          Status: <span id="status" class="mono">ready</span>
        </div>
        <div class="tiny">
          (This is a simulated terminal. Numbers are symbolic.)
        </div>
      </section>
    </main>
  </div>

  <!-- modal -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modalBackdrop" id="modalClose"></div>
    <div class="modalCard">
      <div class="modalHeader">
        <div class="modalTitle">Outcome Update</div>
        <button class="icon" id="modalX" aria-label="Close">×</button>
      </div>
      <div class="modalBody" id="modalBody">
        —
      </div>
      <button class="modalBtn" id="modalOk">Understood</button>
    </div>
  </div>

  <script type="module" src="./pay.js?v=pay3"></script>
</body>
</html>
