<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>功德 Shrine</title>
  <link rel="stylesheet" href="./shrine.css" />
</head>
<body>
  <div id="app">
    <!-- 3D canvas goes here -->
    <canvas id="scene"></canvas>

    <!-- Collage overlay -->
    <div id="collage">
      <img class="scrap" src="../assets/images/scrap1.png" alt="" />
      <img class="scrap" src="../assets/images/scrap2.png" alt="" />
      <div class="stamp">功德无量</div>
    </div>

    <!-- Mini figurines wall -->
    <div id="wall">
      <div id="wall-title">千佛墙 / 1-minute blessings</div>
      <div id="tiles"></div>
    </div>

    <!-- Audio gate -->
    <button id="enable-audio">🔊 Enable Blessings Audio</button>

    <!-- Debug controls (we’ll remove later) -->
    <button id="test-donate">+ Test Donation</button>
  </div>

  <script type="module" src="./shrine.js"></script>
</body>
</html>
